name: Backend CI/CD Pipeline

# 1. Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 2. Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 3. Set up the Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Speeds up the pipeline by caching dependencies

    # 4. Install the dependencies from your requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 5. Run the AI QA Evaluation Suite
    - name: Run Pytest Suite
      env:
        # Pulls your Gemini API key from GitHub Secrets securely
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
      run: |
        pytest test_ai_recommender.py -v

    # 6. Trigger Render Deployment (Only runs if the push is to main AND tests pass)
    - name: Trigger Render Deployment
      if: github.ref == 'refs/heads/main' && success()
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        echo "Tests passed! Triggering Render deployment..."
        curl -X POST $RENDER_DEPLOY_HOOK