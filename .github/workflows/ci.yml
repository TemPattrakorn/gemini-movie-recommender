name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-html  # <-- Added the HTML plugin here

    - name: Run Pytest Suite
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} 
      # Tell Pytest to output the visual HTML file
      run: |
        pytest test_ai_recommender.py -v --html=backend-report.html --self-contained-html

    # --- NEW ARTIFACT STEP ---
    - name: Upload Pytest HTML Report
      uses: actions/upload-artifact@v4
      if: always() # Always upload, even if a test fails so you can see why!
      with:
        name: backend-test-report
        path: backend-report.html
        retention-days: 30

    - name: Trigger Render Deployment
      if: github.ref == 'refs/heads/main' && success()
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        echo "Tests passed! Triggering Render deployment..."
        curl -X POST $RENDER_DEPLOY_HOOK